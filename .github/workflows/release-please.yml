name: Release & Custom Changelog

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # Standard release-please job – opens a release PR, creates tags + releases
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: simple

  # This job runs ONLY after a new release is created (i.e., the release PR was merged)
  append-file-tree:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        run: npm install directory-tree

      - name: Generate changed‑files tree and append to CHANGELOG.md
        run: node scripts/append-file-tree.js ${{ needs.release-please.outputs.tag_name }}

      - name: Commit and push the updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: add changed-files tree to CHANGELOG.md [skip ci]"
          git push
